name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android native project
        run: |
          cd client
          npx expo prebuild --platform android --clean

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Configure release signing
        run: |
          cat >> client/android/gradle.properties << 'EOF'
          
          # Use debug signing for release builds
          android.signingConfigs.release.storePassword=android
          android.signingConfigs.release.keyPassword=android
          android.signingConfigs.release.keyAlias=androiddebugkey
          android.signingConfigs.release.storeFile=$HOME/.android/debug.keystore
          EOF

      - name: Bundle JS with Expo export
        run: |
          cd client
          npx expo export --platform android

      - name: Copy bundle to Android assets
        run: |
          mkdir -p client/android/app/src/main/assets
          cp -r client/dist/* client/android/app/src/main/assets/

      - name: Build Release APK
        run: |
          cd client/android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrammarFloat-Release-APK
          path: client/android/app/build/outputs/apk/release/*.apk
