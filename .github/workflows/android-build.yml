name: Build Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          cd client
          npm ci

      - name: Generate Android native project
        run: |
          cd client
          npx expo prebuild --platform android --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Release APK
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleRelease
        env:
          ANDROID_HOME: /opt/android-sdk
          ANDROID_SDK_ROOT: /opt/android-sdk
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrammarFloat-APK
          path: client/android/app/build/outputs/apk/release/app-release.apk

  build-ios:
    name: Build iOS (for reference)
    runs-on: macos-latest
    if: false # Disabled by default, requires Apple Developer account
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup iOS
        run: |
          cd client
          npm ci
          npx expo prebuild --platform ios --clean
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS
        run: |
          cd client/ios
          xcodebuild -workspace GrammarFloat.xcworkspace -scheme GrammarFloat -configuration Release -archivePath build/GrammarFloat.xcarchive archive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrammarFloat-IPA
          path: client/ios/build/GrammarFloat.xcarchive
