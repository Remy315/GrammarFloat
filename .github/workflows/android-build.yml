name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android native project
        run: |
          cd client
          npx expo prebuild --platform android --clean

      - name: Export Expo project to bundle
        run: |
          cd client
          npx expo export --platform android --output-dir ../dist

      - name: Copy bundle to Android assets
        run: |
          mkdir -p client/android/app/src/main/assets
          cp dist/_expo/static/js/android/*.js client/android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          cp dist/_expo/*.js client/android/app/src/main/assets/index.android.bundle 2>/dev/null || \
          echo "Using alternative bundle method"

      - name: Bundle JS for Android
        run: |
          mkdir -p client/android/app/src/main/assets
          cd client
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Debug APK
        run: |
          cd client/android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrammarFloat-APK
          path: client/android/app/build/outputs/apk/debug/*.apk
