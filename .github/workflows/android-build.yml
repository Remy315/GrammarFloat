name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android native project
        run: |
          cd client
          npx expo prebuild --platform android --clean

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -keystore ~/.android/debug.keystore \
            -storepass android -keypass android \
            -dname "CN=Debug, OU=Debug, O=Debug, L=Debug, ST=Debug, C=US"

      - name: Configure release signing
        run: |
          mkdir -p client/android
          echo "android.signingConfigs.release.storePassword=android" >> client/android/gradle.properties
          echo "android.signingConfigs.release.keyPassword=android" >> client/android/gradle.properties
          echo "android.signingConfigs.release.keyAlias=androiddebugkey" >> client/android/gradle.properties
          echo "android.signingConfigs.release.storeFile=\$HOME/.android/debug.keystore" >> client/android/gradle.properties
          echo "android.signingConfigs.release.enabled=true" >> client/android/gradle.properties
          echo "android.buildTypes.release.signingConfig=release" >> client/android/gradle.properties

      - name: Bundle JS manually
        run: |
          cd client
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res \
            --reset-cache

      - name: Build Release APK with Gradle
        run: |
          cd client/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Find and rename APK
        run: |
          APK=$(find client/android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" ./GrammarFloat-Release.apk
            echo "Found APK: $APK"
          else
            echo "No APK found!"
            find client/android -name "*.apk" -type f
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GrammarFloat-Release-APK
          path: |
            client/android/app/build/outputs/apk/release/*.apk
            GrammarFloat-Release.apk
